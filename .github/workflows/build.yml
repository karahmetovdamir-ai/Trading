name: Forex Bot APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files (Smart Search)
      run: |
        ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "ERROR: No ZIP file found!"
          exit 1
        fi
        unzip "$ZIP_FILE" -d extracted_project
        if [ -d "extracted_project/app" ]; then
          cp -r extracted_project/* .
        else
          cp -r extracted_project/*/* . 2>/dev/null || cp -r extracted_project/* .
        fi

    - name: Handle Missing Environment & API Keys
      run: |
        # Создаем файлы окружения
        touch .env.example .env local.properties
        if [ -d "app" ]; then
          touch app/.env.example app/.env app/local.properties 2>/dev/null || true
        fi
        
        # Прописываем заглушку для API ключа в BuildConfig / local.properties
        echo "GEMINI_API_KEY=mock_key_for_building_purposes" >> local.properties
        if [ -d "app" ]; then
          echo "GEMINI_API_KEY=mock_key_for_building_purposes" >> app/local.properties
        fi

    - name: Bypass Code References (Hard Fix)
      run: |
        # На случай, если ключ зашит прямо в коде как константа,
        # этот скрипт найдет его и создаст глобальную заглушку, чтобы билд не падал
        find . -name "*.kt" -o -name "*.java" | xargs sed -i 's/BuildConfig.GEMINI_API_KEY/"mock_key"/g' 2>/dev/null || true

    - name: Create Auto-Generated Debug Keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp ~/.android/debug.keystore .
        if [ -d "app" ]; then
          cp ~/.android/debug.keystore app/
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: current

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon -Djava.awt.headless=true

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: forex-trading-app
        path: |
          **/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/debug/app-debug.apk
          
